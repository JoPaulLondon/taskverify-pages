<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Expired — TaskVerify</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f9fafb;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 48px 40px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    text-align: center;
  }
  .icon { font-size: 56px; margin-bottom: 20px; }
  h1 { font-size: 24px; font-weight: 700; color: #111827; margin-bottom: 12px; }
  p { font-size: 15px; color: #6b7280; line-height: 1.65; margin-bottom: 8px; }
  .note { font-size: 13px; color: #9ca3af; margin-top: 24px; }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">⏳</div>
    <h1>Link expired</h1>
    <p>This verification link expired after 48 hours.</p>
    <p class="note">Ask your manager to send a new verification email.</p>
  </div>
</body>
</html>
