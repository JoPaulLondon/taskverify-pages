<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Already Verified — TaskVerify</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f9fafb;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 48px 40px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    text-align: center;
  }
  .icon { font-size: 56px; margin-bottom: 20px; }
  h1 { font-size: 24px; font-weight: 700; color: #111827; margin-bottom: 12px; }
  p { font-size: 15px; color: #6b7280; line-height: 1.65; margin-bottom: 8px; }
  .btn {
    display: block;
    text-decoration: none;
    padding: 14px 24px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 15px;
    margin-top: 12px;
  }
  .btn-primary { background: #2563eb; color: #ffffff; }
  .note { font-size: 13px; color: #9ca3af; margin-top: 24px; }
</style>
</head>
<body>
  <div class="card">
   <div class="icon">✅</div>
   <h1>Email confirmed!</h1>
   <p>Your email address has been verified. You can now receive job assignments.</p>
   <div style="margin-top: 28px;">
     <a href="taskverify://" class="btn btn-primary">Open the app</a>
   </div>
    <p class="note">Tap above to open TaskVerify.</p>
  </div>
</body>
</html>
